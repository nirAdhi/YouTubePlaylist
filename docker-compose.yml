version: '3.9'

services:
  frontend:
    build: ./frontend
    # Only expose to local network - use Nginx Proxy Manager for public access
    ports:
      - "3003:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - vidvault-internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Next.js needs write access for .next/cache
    tmpfs:
      - /tmp
      - /app/.next/cache

  backend:
    build: ./backend
    # No external port - only accessible via internal network or nginx proxy
    expose:
      - "5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      - db
      - redis
    networks:
      - vidvault-internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  worker:
    build: ./backend
    command: sh worker-startup.sh
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      - db
      - redis
    networks:
      - vidvault-internal
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No external port - only accessible via internal network
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vidvault-internal
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No external port - only accessible via internal network
    expose:
      - "6379"
    command: >
      sh -c '
        if [ -z "$${REDIS_PASSWORD}" ]; then
          echo "FATAL: REDIS_PASSWORD not set" >&2;
          exit 1;
        fi;
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
      '
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - vidvault-internal
    security_opt:
      - no-new-privileges:true

networks:
  vidvault-internal:
    driver: bridge
    internal: false

volumes:
  pgdata:
  redisdata:
