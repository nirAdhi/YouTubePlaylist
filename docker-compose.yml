version: '3.9'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://46.224.110.185:5000

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/vidvault
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - JWT_SECRET=vidvault-secret-key-change-in-production
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    command: sh worker-startup.sh
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/vidvault
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=vidvault-secret-key-change-in-production
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: vidvault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
