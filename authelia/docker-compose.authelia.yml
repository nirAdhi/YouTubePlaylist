version: '3.8'

services:
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    expose:
      - 9091
    ports:
      - "127.0.0.1:9091:9091"
    volumes:
      - ./authelia/config:/config
    environment:
      - TZ=UTC
    networks:
      - vidvault-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis-authelia:
    image: redis:7-alpine
    container_name: authelia-redis
    restart: unless-stopped
    expose:
      - 6379
    volumes:
      - authelia-redis-data:/data
    networks:
      - vidvault-internal
    command: >
      sh -c '
        if [ -z "$${REDIS_PASSWORD}" ]; then
          echo "FATAL: REDIS_PASSWORD not set" >&2;
          exit 1;
        fi;
        redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
      '
    env_file:
      - ../.env

volumes:
  authelia-redis-data:

networks:
  vidvault-internal:
    external: true
